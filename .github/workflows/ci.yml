name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:

jobs:
  tests:
    name: PHP ${{ matrix.php }} / Laravel ${{ matrix.laravel }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          # Laravel 10/11 are past security support; Composer blocks laravel/framework
          # installs unless audit blocking is disabled for these jobs.
          - php: '8.2'
            laravel: '^10.50'
            testbench: '^8.37'
            allow_insecure: 'true'
          - php: '8.3'
            laravel: '^10.50'
            testbench: '^8.37'
            allow_insecure: 'true'
          - php: '8.2'
            laravel: '^11.50'
            testbench: '^9.17'
            allow_insecure: 'true'
          - php: '8.3'
            laravel: '^11.50'
            testbench: '^9.17'
            allow_insecure: 'true'
          - php: '8.4'
            laravel: '^11.50'
            testbench: '^9.17'
            allow_insecure: 'true'
          - php: '8.3'
            laravel: '^12.61'
            testbench: '^10.11'
            allow_insecure: 'false'
          - php: '8.4'
            laravel: '^12.61'
            testbench: '^10.11'
            allow_insecure: 'false'
          - php: '8.3'
            laravel: '^13.12'
            testbench: '^11.0'
            allow_insecure: 'false'
          - php: '8.4'
            laravel: '^13.12'
            testbench: '^11.0'
            allow_insecure: 'false'
    steps:
      - uses: actions/checkout@v5

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: json, curl, mbstring
          coverage: none

      - name: Allow insecure deps for EOL Laravel
        if: matrix.allow_insecure == 'true'
        run: composer config audit.block-insecure false

      - name: Install dependencies
        run: |
          composer require "illuminate/support:${{ matrix.laravel }}" --no-update --no-interaction
          composer require "orchestra/testbench:${{ matrix.testbench }}" --dev --no-update --no-interaction
          composer update --prefer-dist --no-interaction --with-all-dependencies

      - name: Run PHPUnit
        run: vendor/bin/phpunit

  phpstan:
    name: PHPStan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: json, curl, mbstring
          coverage: none

      - name: Install dependencies
        run: composer update --prefer-dist --no-interaction

      - name: Run PHPStan
        run: vendor/bin/phpstan analyse --memory-limit=512M
